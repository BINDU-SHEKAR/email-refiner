<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Email Polisher</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    #output { white-space: pre-wrap; min-height: 100px; }
  </style>
</head>
<body>
  <div class="container mt-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title text-center mb-4">✉️ Email Polisher</h2>

        <div class="mb-3">
          <label for="draft" class="form-label">Draft Email</label>
          <textarea id="draft" class="form-control" rows="6" placeholder="Enter your draft email here"></textarea>
        </div>

        <div class="mb-3">
          <label for="tone" class="form-label">Tone</label>
          <select id="tone" class="form-select">
            <option value="formal">Formal</option>
            <option value="polite">Polite</option>
            <option value="concise">Concise</option>
            <option value="persuasive">Persuasive</option>
          </select>
        </div>

        <div class="d-grid">
          <button class="btn btn-primary" onclick="polishEmail()">✨ Polish Email</button>
        </div>

        <h4 class="mt-4">Polished Output:</h4>
        <div class="alert alert-secondary" id="output">Waiting...</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
